<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iniciar sesión</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-wrapper d-flex align-items-center justify-content-center min-vh-100 bg-primary bg-gradient">
  <div class="card login-card shadow-lg border-0 p-2">
    <div class="card-body p-3">
      <h1 class="h4 text-center mb-1">Bienvenido</h1>
      <p class="text-center text-secondary small mb-4">Ingresa tus credenciales para continuar</p>

      <div class="alert alert-danger py-2 px-3 small d-none" id="errorMsg" role="alert"></div>

      <form id="loginForm">
        <div class="mb-3">
          <label for="usuario" class="form-label small fw-semibold">Usuario</label>
          <input type="text" class="form-control" id="usuario" name="usuario" placeholder="Ej. jdoe" required autocomplete="username">
        </div>

        <div class="mb-4">
          <label for="password" class="form-label small fw-semibold">Contraseña</label>
          <input type="password" class="form-control" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
        </div>

        <button type="submit" class="btn btn-primary w-100" id="loginBtn">Ingresar</button>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/login.js"></script>
</body>
</html>
