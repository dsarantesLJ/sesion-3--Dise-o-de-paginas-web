<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de administración</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="app d-flex min-vh-100">

  <!-- ===== SIDEBAR ===== -->
  <aside class="sidebar d-flex flex-column flex-shrink-0 text-white">
    <div class="logo px-3 py-3 fs-5 fw-bold border-bottom border-secondary-subtle">🛍️ Mi Panel</div>
    <nav class="nav flex-column flex-grow-1 py-2">
      <a href="#" class="nav-link active" data-section="dashboard">📊 Dashboard</a>
      <a href="#" class="nav-link" data-section="products">📦 Productos</a>
    </nav>
    <button class="btn btn-danger m-3" id="logoutBtn">Cerrar sesión</button>
  </aside>

  <!-- ===== MAIN ===== -->
  <div class="main d-flex flex-column flex-grow-1">
    <div class="topbar d-flex justify-content-between align-items-center px-4 py-3 bg-white border-bottom">
      <h2 class="h5 mb-0" id="sectionTitle">Dashboard</h2>
      <span id="userLabel" class="text-secondary small"></span>
    </div>

    <div class="content p-4 flex-grow-1">

      <!-- ===== SECCIÓN DASHBOARD ===== -->
      <section id="dashboard-section">
        <div class="row g-3 mb-2">
          <div class="col-md-4">
            <div class="card h-100 p-3 border">
              <span class="text-secondary small mb-2 d-block">Total de productos</span>
              <strong class="fs-2" id="totalProducts">0</strong>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card h-100 p-3 border">
              <span class="text-secondary small mb-2 d-block">Valor total en inventario</span>
              <strong class="fs-2" id="totalValue">$0.00</strong>
            </div>
          </div>
          <div class="col-md-4">
            <div class="card h-100 p-3 border">
              <span class="text-secondary small mb-2 d-block">Stock bajo (&lt; 5)</span>
              <strong class="fs-2" id="lowStock">0</strong>
            </div>
          </div>
        </div>
      </section>

      <!-- ===== SECCIÓN PRODUCTOS (CRUD) ===== -->
      <section id="products-section" class="d-none">
        <div class="card border">
          <div class="card-header d-flex justify-content-between align-items-center bg-white">
            <strong>Listado de productos</strong>
            <button class="btn btn-primary btn-sm" id="addProductBtn">+ Nuevo producto</button>
          </div>

          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Nombre</th>
                  <th>Categoría</th>
                  <th>Precio</th>
                  <th>Stock</th>
                  <th>Acciones</th>
                </tr>
              </thead>
              <tbody id="productsTableBody">
                <!-- filas dinámicas -->
              </tbody>
            </table>
          </div>

          <div class="empty-state d-none text-center text-secondary py-5" id="emptyState">No hay productos registrados.</div>
        </div>
      </section>

    </div>
  </div>
</div>

<!-- ===== MODAL: Crear / Editar producto ===== -->
<div class="position-fixed top-0 start-0 w-100 h-100 align-items-center justify-content-center bg-dark bg-opacity-50 d-none" id="modalOverlay">
  <div class="modal-box card shadow-lg border-0 p-3" style="width:100%; max-width:420px;">
    <div class="card-body">
      <h3 class="h5 mb-3" id="modalTitle">Nuevo producto</h3>

      <div class="alert alert-danger py-2 px-3 small d-none" id="modalError" role="alert"></div>

      <form id="productForm">
        <input type="hidden" id="productId">

        <div class="mb-3">
          <label for="nombre" class="form-label small fw-semibold">Nombre</label>
          <input type="text" class="form-control" id="nombre" required>
        </div>

        <div class="mb-3">
          <label for="categoria" class="form-label small fw-semibold">Categoría</label>
          <input type="text" class="form-control" id="categoria" required>
        </div>

        <div class="mb-3">
          <label for="precio" class="form-label small fw-semibold">Precio</label>
          <input type="number" class="form-control" id="precio" min="0" step="0.01" required>
        </div>

        <div class="mb-3">
          <label for="stock" class="form-label small fw-semibold">Stock</label>
          <input type="number" class="form-control" id="stock" min="0" step="1" required>
        </div>

        <div class="modal-footer border-0 px-0 pb-0">
          <button type="button" class="btn btn-secondary flex-fill" id="cancelBtn">Cancelar</button>
          <button type="submit" class="btn btn-primary flex-fill" id="saveBtn">Guardar</button>
        </div>
      </form>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
